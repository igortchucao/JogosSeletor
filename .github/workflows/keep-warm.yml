name: acordar-servidor

# O cron do GitHub Actions roda a cada 1-3h (nao a cada 10min) e nao segura o Render
# acordado -> era inutil e spammava e-mail de falha. Virou um botao MANUAL de "acordar":
# aba Actions -> acordar-servidor -> Run workflow, uns 40s antes de jogar.
on:
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healthz
        run: |
          URL="https://contato-acmu.onrender.com/healthz"
          # cold start do container .NET pode levar 40-90s, entao espera de verdade
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 "$URL") || code=000
            echo "tentativa $i -> HTTP $code"
            [ "$code" = "200" ] && echo "servidor acordado" && exit 0
            sleep 15
          done
          echo "::error::servidor nao respondeu 200 apos 5 tentativas"
          exit 1   # falha de verdade: um check verde agora significa algo
